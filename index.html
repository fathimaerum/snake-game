<!DOCTYPE html>
<html>
<head>
    <title>Snake Game</title>
</head>
<body style="text-align:center; background:#111; color:white;">
    <h1>🐍 Snake Game</h1>
    <canvas id="game" width="400" height="400" style="background:black"></canvas>

    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");

        let snake = [{x:200,y:200}];
        let dx = 20, dy = 0;
        let food = {x:100,y:100};

        document.addEventListener("keydown", e => {
            if(e.key==="ArrowUp"){dx=0;dy=-20;}
            if(e.key==="ArrowDown"){dx=0;dy=20;}
            if(e.key==="ArrowLeft"){dx=-20;dy=0;}
            if(e.key==="ArrowRight"){dx=20;dy=0;}
        });

        function gameLoop(){
            let head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);

            if(head.x===food.x && head.y===food.y){
                food = {
                    x: Math.floor(Math.random()*20)*20,
                    y: Math.floor(Math.random()*20)*20
                };
            } else {
                snake.pop();
            }

            ctx.fillStyle="black";
            ctx.fillRect(0,0,400,400);

            ctx.fillStyle="red";
            ctx.fillRect(food.x, food.y, 20, 20);

            ctx.fillStyle="lime";
            snake.forEach(p => ctx.fillRect(p.x,p.y,20,20));
        }

        setInterval(gameLoop, 150);
    </script>
</body>
</html>
